<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Animal Adventure Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sky: #dff4ff;
        --sun: #ffd36b;
        --mint: #e8fff0;
        --forest: #1f6a4b;
        --ocean: #1f7aa8;
        --ink: #143042;
        --card: #fffaf0;
        --good: #1b8f4f;
        --bad: #c94d2f;
        --shadow: 0 12px 30px rgba(20, 48, 66, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Nunito", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 10%, var(--sun) 0 10%, transparent 11%),
          radial-gradient(circle at 90% 20%, #9ae8ff 0 12%, transparent 13%),
          linear-gradient(165deg, var(--sky), var(--mint));
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .quiz-shell {
        width: min(46rem, 100%);
        background: var(--card);
        border: 4px solid #ffffff;
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 1.25rem;
        animation: rise-in 420ms ease-out;
      }

      .brand {
        text-align: center;
      }

      .brand h1 {
        font-family: "Baloo 2", cursive;
        margin: 0;
        font-size: clamp(2rem, 4.5vw, 2.9rem);
        color: var(--forest);
        line-height: 1;
      }

      .brand p {
        margin: 0.4rem 0 1.2rem;
        font-weight: 700;
        color: #305669;
      }

      .panel {
        background: #ffffffd9;
        border: 2px dashed #b7d9ea;
        border-radius: 20px;
        padding: 1rem;
      }

      .actions {
        display: flex;
        justify-content: center;
      }

      .btn {
        border: none;
        border-radius: 999px;
        padding: 0.8rem 1.3rem;
        font: 800 1rem/1 "Nunito", sans-serif;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      .btn:focus-visible {
        outline: 3px solid #0a6a96;
        outline-offset: 3px;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: linear-gradient(180deg, #3ca6d8, var(--ocean));
        color: #fff;
        box-shadow: 0 8px 16px rgba(31, 122, 168, 0.3);
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
        font-weight: 800;
        margin-bottom: 0.65rem;
      }

      .question {
        font-size: clamp(1.15rem, 3.2vw, 1.55rem);
        font-weight: 800;
        margin: 0.35rem 0 1rem;
      }

      .answers {
        display: grid;
        gap: 0.7rem;
      }

      .answer-btn {
        text-align: left;
        padding: 0.9rem 1rem;
        border-radius: 14px;
        border: 2px solid #b8d8e8;
        background: #f5fbff;
        color: var(--ink);
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        animation: pop-in 260ms ease both;
      }

      .answer-btn:disabled {
        cursor: not-allowed;
      }

      .answer-btn.correct {
        background: #dcf7e7;
        border-color: #8dd5ae;
        color: #0b5f30;
      }

      .answer-btn.wrong {
        background: #ffe7e1;
        border-color: #f0a393;
        color: #7f2d1b;
      }

      .feedback {
        min-height: 1.4rem;
        font-weight: 800;
        margin: 0.8rem 0;
      }

      .feedback.good {
        color: var(--good);
      }

      .feedback.bad {
        color: var(--bad);
      }

      .result-score {
        font-family: "Baloo 2", cursive;
        font-size: clamp(2.1rem, 7vw, 3rem);
        color: var(--forest);
        margin: 0.2rem 0 0;
      }

      .result-text {
        margin-top: 0.3rem;
        font-size: 1.07rem;
        font-weight: 700;
      }

      [hidden] {
        display: none !important;
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pop-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 560px) {
        .quiz-shell {
          padding: 1rem;
          border-radius: 20px;
        }

        .answer-btn {
          font-size: 0.95rem;
          padding: 0.85rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="quiz-shell" aria-live="polite">
      <section class="brand">
        <h1>Animal Adventure Quiz</h1>
        <p>5 questions, 4 choices each. Ready to explore?</p>
      </section>

      <section id="start-screen" class="panel">
        <p>
          Pick the best answer for each animal question. You can earn up to
          <strong>5 points</strong>.
        </p>
        <div class="actions">
          <button id="start-btn" class="btn btn-primary" type="button">
            Start Quiz
          </button>
        </div>
      </section>

      <section id="quiz-screen" class="panel" hidden>
        <div class="meta-row">
          <p id="progress" aria-live="polite">Question 1 of 5</p>
          <p id="score">Score: 0</p>
        </div>

        <h2 id="question-text" class="question"></h2>
        <div id="answers" class="answers"></div>

        <p id="feedback" class="feedback" aria-live="polite"></p>

        <div class="actions">
          <button id="next-btn" class="btn btn-primary" type="button" hidden>
            Next Question
          </button>
        </div>
      </section>

      <section id="result-screen" class="panel" hidden>
        <h2>Quiz Finished</h2>
        <p id="result-score" class="result-score"></p>
        <p id="result-text" class="result-text"></p>
        <div class="actions">
          <button id="restart-btn" class="btn btn-primary" type="button">
            Play Again
          </button>
        </div>
      </section>
    </main>

    <script>
      const QUESTIONS_PER_RUN = 5;

      const animalQuestions = [
        {
          question: "Which animal is known as the king of the jungle?",
          options: ["Elephant", "Lion", "Monkey", "Zebra"],
          answer: "Lion",
        },
        {
          question: "What do pandas mostly eat?",
          options: ["Fish", "Bamboo", "Nuts", "Grass"],
          answer: "Bamboo",
        },
        {
          question: "Which animal can live in the ocean and on land?",
          options: ["Dolphin", "Frog", "Shark", "Whale"],
          answer: "Frog",
        },
        {
          question: "What is a baby dog called?",
          options: ["Cub", "Pup", "Foal", "Kid"],
          answer: "Pup",
        },
        {
          question: "Which bird is famous for saying 'hoo hoo'?",
          options: ["Parrot", "Eagle", "Owl", "Swan"],
          answer: "Owl",
        },
        {
          question: "Which animal has a very long neck?",
          options: ["Giraffe", "Rabbit", "Koala", "Tiger"],
          answer: "Giraffe",
        },
        {
          question: "Where do penguins live?",
          options: ["Deserts", "Rainforests", "Cold icy places", "Caves"],
          answer: "Cold icy places",
        },
        {
          question: "Which animal is the largest in the world?",
          options: ["Blue whale", "Hippopotamus", "Elephant", "Gorilla"],
          answer: "Blue whale",
        },
        {
          question: "What do bees make?",
          options: ["Milk", "Honey", "Silk", "Cheese"],
          answer: "Honey",
        },
        {
          question: "Which animal can hop and carries babies in a pouch?",
          options: ["Koala", "Kangaroo", "Bear", "Fox"],
          answer: "Kangaroo",
        },
        {
          question: "Which pet says 'meow'?",
          options: ["Cat", "Dog", "Hamster", "Parrot"],
          answer: "Cat",
        },
        {
          question: "Which farm animal gives us wool?",
          options: ["Goat", "Cow", "Sheep", "Duck"],
          answer: "Sheep",
        },
      ];

      const startScreen = document.getElementById("start-screen");
      const quizScreen = document.getElementById("quiz-screen");
      const resultScreen = document.getElementById("result-screen");

      const startBtn = document.getElementById("start-btn");
      const nextBtn = document.getElementById("next-btn");
      const restartBtn = document.getElementById("restart-btn");

      const progressEl = document.getElementById("progress");
      const scoreEl = document.getElementById("score");
      const questionTextEl = document.getElementById("question-text");
      const answersEl = document.getElementById("answers");
      const feedbackEl = document.getElementById("feedback");
      const resultScoreEl = document.getElementById("result-score");
      const resultTextEl = document.getElementById("result-text");

      let selectedQuestions = [];
      let currentQuestionIndex = 0;
      let score = 0;
      let answered = false;

      function shuffle(items) {
        const copy = [...items];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function validateQuestionData() {
        const valid = animalQuestions.every((item) => {
          return (
            typeof item.question === "string" &&
            Array.isArray(item.options) &&
            item.options.length === 4 &&
            item.options.includes(item.answer)
          );
        });

        return valid && animalQuestions.length >= QUESTIONS_PER_RUN;
      }

      function startQuiz() {
        if (!validateQuestionData()) {
          startScreen.innerHTML =
            "<p>Quiz setup error. Please check question data.</p>";
          return;
        }

        selectedQuestions = shuffle(animalQuestions).slice(0, QUESTIONS_PER_RUN);
        currentQuestionIndex = 0;
        score = 0;
        answered = false;

        startScreen.hidden = true;
        resultScreen.hidden = true;
        quizScreen.hidden = false;

        renderQuestion();
      }

      function renderQuestion() {
        answered = false;
        nextBtn.hidden = true;
        feedbackEl.textContent = "";
        feedbackEl.className = "feedback";

        const current = selectedQuestions[currentQuestionIndex];
        questionTextEl.textContent = current.question;
        progressEl.textContent = `Question ${currentQuestionIndex + 1} of ${QUESTIONS_PER_RUN}`;
        scoreEl.textContent = `Score: ${score}`;
        answersEl.innerHTML = "";

        current.options.forEach((option, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "answer-btn";
          button.textContent = option;
          button.style.animationDelay = `${index * 60}ms`;
          button.addEventListener("click", () => selectAnswer(button, option));
          answersEl.appendChild(button);
        });
      }

      function selectAnswer(clickedButton, selectedOption) {
        if (answered) {
          return;
        }

        answered = true;
        const current = selectedQuestions[currentQuestionIndex];
        const isCorrect = selectedOption === current.answer;
        const allButtons = answersEl.querySelectorAll("button");

        allButtons.forEach((button) => {
          button.disabled = true;
          if (button.textContent === current.answer) {
            button.classList.add("correct");
          }
        });

        if (isCorrect) {
          score += 1;
          clickedButton.classList.add("correct");
          feedbackEl.textContent = "Correct! Great job!";
          feedbackEl.classList.add("good");
        } else {
          clickedButton.classList.add("wrong");
          feedbackEl.textContent = `Not quite. The correct answer is ${current.answer}.`;
          feedbackEl.classList.add("bad");
        }

        scoreEl.textContent = `Score: ${score}`;
        nextBtn.hidden = false;
        nextBtn.focus();
      }

      function showResults() {
        quizScreen.hidden = true;
        resultScreen.hidden = false;

        const percent = Math.round((score / QUESTIONS_PER_RUN) * 100);
        resultScoreEl.textContent = `${score} / ${QUESTIONS_PER_RUN}`;

        if (score === QUESTIONS_PER_RUN) {
          resultTextEl.textContent = `Amazing! You got every question right (${percent}%).`;
        } else if (score >= 3) {
          resultTextEl.textContent = `Nice work! You scored ${percent}%.`;
        } else {
          resultTextEl.textContent = `Great try! You scored ${percent}%. Play again to beat your score.`;
        }
      }

      function nextQuestion() {
        currentQuestionIndex += 1;
        if (currentQuestionIndex >= QUESTIONS_PER_RUN) {
          showResults();
          return;
        }
        renderQuestion();
      }

      startBtn.addEventListener("click", startQuiz);
      nextBtn.addEventListener("click", nextQuestion);
      restartBtn.addEventListener("click", startQuiz);
    </script>
  </body>
</html>
